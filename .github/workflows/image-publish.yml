name: Image build

on:
  push:
    branches: [ "main" ]
    # Publish semver tags as releases.
    paths:
      - '**.php'
      - 'composer.*'
      - 'config/**'
      - '.github/**'
      - 'Procfile'
      - 'project.toml'
  pull_request:
    branches: [ "main" ]

env:
  DESCRIPTION: "Wordpress Heroku App Image https://kubectl.blog"

jobs:
  pack-build:
    name: Pack Build and Publish!
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - uses: buildpacks/github-actions/setup-pack@v4.8.0
    - name: Docker registry login
      uses: docker/login-action@v1
      with:
        registry: ghcr.io/felegy
        username: felegy
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Set build environment
      run: |
        year=$(date +%Y);
        day=$(date +%j);
        ref="${GITHUB_REF#refs/*/}";
        echo "REF=$ref" >> $GITHUB_ENV;
        tag="${GITHUB_REF#tags/*/}";
        [[ $tag == '' ]] || tag="${year}.${day}.${{ github.run_number }}";
        echo "TAG=$tag" >> $GITHUB_ENV;
    - name: Build Image with pack
      run: |
        [[ ! -z  $(yq e '. | keys' Procfile | cut -c 3- | grep bash) ]] \
        || echo 'bash: bash -l' >> Procfile
        pack build "ghcr.io/felegy/kubectl-blog:$TAG" \
          --builder heroku/buildpacks:20 \
          --descriptor project.toml \
          --workspace /app;
    - name: Tag Docker image to ref
      run: |
        docker tag ghcr.io/felegy/kubectl.blog:$TAG ghcr.io/felegy/kubectl.blog:$REF
    - name: Docker push
      run: |
        docker push ghcr.io/felegy/kubectl.blog:$TAG
        docker push ghcr.io/felegy/kubectl.blog:$REF
